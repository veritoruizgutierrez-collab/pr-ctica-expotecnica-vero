<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - ExpoTécnica 2026</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Registro de Proyectos</h1>
</header>

<nav>
  <a href="index.html">Inicio</a>
  <a href="registro.html">Registro</a>
  <a href="proyectos.html">Proyectos</a>
</nav>

<div class="container">

<form id="formProyecto">

  <input type="text" id="nombre" placeholder="Nombre del proyecto">
  <input type="text" id="integrantes" placeholder="Integrantes">
  <input type="text" id="especialidad" placeholder="Especialidad">
  <input type="text" id="categoria" placeholder="Categoría">
  <textarea id="descripcion" placeholder="Descripción"></textarea>
  <input type="number" id="puntaje" placeholder="Puntaje (0-100)">

  <button type="submit">Guardar Proyecto</button>

</form>

</div>
