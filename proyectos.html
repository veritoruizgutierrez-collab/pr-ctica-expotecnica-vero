<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos - ExpoTécnica 2026</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Lista de Proyectos</h1>
</header>

<nav>
  <a href="index.html">Inicio</a>
  <a href="registro.html">Registro</a>
  <a href="proyectos.html">Proyectos</a>
</nav>

<div class="container">

<!-- ESTADÍSTICAS -->
<div class="stats">
  <div class="card">
    <h3>Total</h3>
    <p id="total">0</p>
  </div>

  <div class="card">
    <h3>Promedio</h3>
    <p id="promedio">0</p>
  </div>

  <input type="text" id="buscar" placeholder="Buscar proyecto...">
  <input type="text" id="filtroEsp" placeholder="Especialidad">
  <input type="text" id="filtroCat" placeholder="Categoría">
</div>

<!-- TABLA -->
<table>
  <thead>
    <tr>
      <th>Proyecto</th>
      <th>Especialidad</th>
      <th>Categoría</th>
      <th>Puntaje</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody id="tabla"></tbody>
</table>

</div>

<!-- BOTÓN VOLVER -->
<div style="text-align:center; margin:20px;">
  <a href="index.html"><button>⬅ Volver al Inicio</button></a>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Detalles</h2>
    <p id="detalle"></p>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
